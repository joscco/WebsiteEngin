<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background with rounded corners -->
  <rect width="192" height="192" rx="38" fill="#0f172a"/>

  <!-- Rising bar chart (3 bars, left-to-right ascending) -->
  <!-- Bar 1 – short, blue-600 -->
  <rect x="26" y="118" width="38" height="52" rx="7" fill="#2563eb"/>
  <!-- Bar 2 – medium, blue-500 -->
  <rect x="77" y="82" width="38" height="88" rx="7" fill="#3b82f6"/>
  <!-- Bar 3 – tall, blue-400 -->
  <rect x="128" y="40" width="38" height="130" rx="7" fill="#60a5fa"/>

</svg>
